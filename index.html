<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern responsive image gallery with filters, search, favorites, lightbox, and theme switching." />
  <title>Modern Image Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page-shell">
    <header class="site-header">
      <div>
        <p class="eyebrow">Portfolio Collection</p>
        <h1>Modern Image Gallery</h1>
        <p class="header-copy">Explore a polished set of curated images across nature, animals, architecture, and travel.</p>
      </div>

      <div class="header-actions" aria-label="Gallery tools">
        <span class="image-count" id="image-count">0 images</span>
        <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle dark and light mode" title="Toggle theme">
          <span class="theme-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M21 13.1A8.5 8.5 0 0 1 10.9 3a7 7 0 1 0 10.1 10.1Z"></path>
            </svg>
          </span>
        </button>
      </div>
    </header>

    <section class="toolbar" aria-label="Search and gallery actions">
      <label class="search-field" for="search-input">
        <span aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-4.2-4.2"></path>
          </svg>
        </span>
        <input id="search-input" type="search" placeholder="Search by image title..." autocomplete="off" />
      </label>

      <button class="shuffle-button" id="shuffle-button" type="button">
        <span aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M16 3h5v5"></path>
            <path d="M4 20 21 3"></path>
            <path d="M21 16v5h-5"></path>
            <path d="m15 15 6 6"></path>
            <path d="M4 4l5 5"></path>
          </svg>
        </span>
        Shuffle
      </button>
    </section>

    <nav class="filter-nav" aria-label="Filter images by category">
      <button class="filter-button active" type="button" data-filter="all">All</button>
      <button class="filter-button" type="button" data-filter="nature">Nature</button>
      <button class="filter-button" type="button" data-filter="animals">Animals</button>
      <button class="filter-button" type="button" data-filter="architecture">Architecture</button>
      <button class="filter-button" type="button" data-filter="travel">Travel</button>
    </nav>

    <main>
      <section class="gallery-grid" id="gallery-grid" aria-live="polite"></section>

      <section class="empty-state" id="empty-state" hidden>
        <h2>No images found</h2>
        <p>Try another category or search term.</p>
      </section>
    </main>
  </div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview" hidden>
    <button class="lightbox-backdrop" id="lightbox-backdrop" type="button" aria-label="Close lightbox"></button>

    <div class="lightbox-panel">
      <div class="lightbox-topbar">
        <p class="lightbox-counter" id="lightbox-counter">1 / 1</p>
        <div class="lightbox-actions">
          <button class="lightbox-button" id="download-button" type="button" aria-label="Download image" title="Download image">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 21h14"></path>
            </svg>
          </button>
          <button class="lightbox-button" id="close-button" type="button" aria-label="Close lightbox" title="Close">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
      </div>

      <button class="lightbox-nav prev" id="prev-button" type="button" aria-label="Previous image">
        <svg viewBox="0 0 24 24" role="img">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>
      <figure class="lightbox-figure">
        <img id="lightbox-image" src="" alt="" />
        <figcaption>
          <span id="lightbox-category"></span>
          <h2 id="lightbox-title"></h2>
        </figcaption>
      </figure>
      <button class="lightbox-nav next" id="next-button" type="button" aria-label="Next image">
        <svg viewBox="0 0 24 24" role="img">
          <path d="m9 18 6-6-6-6"></path>
        </svg>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
